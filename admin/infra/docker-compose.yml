version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.fastapi
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PORT=8000
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.nextjs
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://api:8000
      - PORT=3000
    depends_on:
      - api
    restart: unless-stopped
