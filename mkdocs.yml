site_name: Hephae Forge Docs
site_description: Internal documentation for the Hephae Forge pipeline
site_url: https://hephae-co.github.io/hephae-forge/

theme:
  name: material
  palette:
    - scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

docs_dir: infra/contracts

nav:
  - Home: index.md
  - Database:
    - Firestore Schema: firestore-schema.md
    - BigQuery Schema: bigquery-schema.md
    - GCS Conventions: gcs-conventions.md
  - API:
    - Web Routes: api-web.md
    - Admin Routes: api-admin.md
  - Pipeline:
    - Qualification Design: qualification-pipeline-design.md
    - Unified Pipeline Design: unified-pipeline-design.md
    - Evaluation Standards: eval-standards.md
    - Eval Ground Truth: eval-ground-truth.md
  - Architecture:
    - TODO / Open Questions: TODO-architecture.md
    - Changelog: changelog.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
