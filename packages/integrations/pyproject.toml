[project]
name = "hephae-integrations"
version = "0.1.0"
description = "Third-party API clients (BLS, USDA, FDA, OSM, social) for hephae-forge"
requires-python = ">=3.12"
dependencies = [
    "hephae-common",
    "httpx>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hephae_integrations"]
